<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法研究報告書</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #222; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; font-family: 'Zen Maru Gothic', sans-serif; }
        
        #capture-area {
            position: relative;
            width: 375px; height: 667px;
            background: #444 url('報告書.png') no-repeat center/contain;
        }

        /* 入力とミラーの共通スタイル：ここがズレると文字が切れる原因になります */
        .text-style {
            position: absolute;
            transform: rotate(-6deg);
            top: 38%; left: 24%;
            width: 50%; height: 26%;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            color: #4a4a4a;
            padding: 8px;
            box-sizing: border-box;
            white-space: pre-wrap; /* 改行を有効にする */
            word-wrap: break-word; /* 長い単語を折り返す */
            text-align: left;
            overflow: hidden; /* 画像化する範囲外は見せない */
        }

        #report-text {
            background: transparent;
            border: none; outline: none; resize: none;
            z-index: 10;
        }

        /* 保存時のみ表示されるミラー。背景を透過させて文字だけ浮き上がらせる */
        #text-mirror {
            display: none;
            z-index: 5;
            background: transparent;
        }

        .photo-frame {
            position: absolute; transform: rotate(-6deg);
            top: 61%; left: 29%; width: 45%; height: 13%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; background: rgba(0,0,0,0.05); cursor: pointer;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: contain; }
        .photo-frame span { font-size: 9px; color: #888; text-align: center; }

        .controls { margin-top: 20px; }
        .btn { padding: 15px 30px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; font-family: 'Zen Maru Gothic', sans-serif; color: white; background: #4a90e2; box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3); font-size: 16px; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="capture-area">
    <textarea id="report-text" class="text-style" placeholder="今日の成果を記録…"></textarea>
    <div id="text-mirror" class="text-style"></div>
    
    <label class="photo-frame">
        <input type="file" accept="image/*" style="display:none;" onchange="previewImage(this)">
        <img id="preview" src="" style="display:none;">
        <span id="plus-text">タップでスクショを追加</span>
    </label>
</div>

<div class="controls">
    <button class="btn" onclick="downloadImage()">画像で書き出し</button>
</div>

<script>
// ページを開いた瞬間に合言葉を聞く
const password = prompt("合言葉を入力してください");
if (password !== "むぎ") {
    alert("合言葉が違います");
    document.body.innerHTML = "<h1>アクセス権限がありません</h1>";
}
    // ページを開いた時に、前回書いた内容（もしあれば）を出す
    window.onload = () => {
        const savedText = localStorage.getItem('magicReport');
        if (savedText) document.getElementById('report-text').value = savedText;
    };

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const previewImg = document.getElementById('preview');
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                document.getElementById('plus-text').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function downloadImage() {
        const area = document.getElementById('capture-area');
        const textarea = document.getElementById('report-text');
        const mirror = document.getElementById('text-mirror');

        // 1. 今入力されている文字をブラウザに自動保存
        localStorage.setItem('magicReport', textarea.value);

        // 2. ミラーに今入力されている内容を完全にコピー
        mirror.innerText = textarea.value;
        
        // 3. ミラーを表示してtextareaを隠す（html2canvasの文字消え対策）
        mirror.style.display = 'block';
        textarea.style.visibility = 'hidden';

        // 4. 少し待ってから撮影
        setTimeout(() => {
            html2canvas(area, {
                useCORS: true,
                scale: 3, // 高画質設定
                backgroundColor: null
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'magic-report.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                // 終わったら元に戻す
                mirror.style.display = 'none';
                textarea.style.visibility = 'visible';
            }).catch(err => {
                alert('保存に失敗しました。GitHubのURLで開いているか確認してください。');
                mirror.style.display = 'none';
                textarea.style.visibility = 'visible';
            });
        }, 200);
    }
</script>

</body>
</html>
