<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法研究報告書</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            background: #222; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
            font-family: 'Zen Maru Gothic', sans-serif; 
        }
        
        #capture-area {
            position: relative;
            width: 375px;
            height: 667px;
            background-color: #444; /* 画像がない時の背景色（真っ黒防止） */
            background-image: url('報告書.png'); /* ファイル名が正しいか確認してね！ */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* 文字入力：位置調整 */
        #report-text {
            position: absolute;
            transform: rotate(-6deg);
            top: 38%; 
            left: 25%;
            width: 48%; 
            height: 22%; 
            background: transparent;
            border: none; outline: none; resize: none;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 12px;
            line-height: 1.6; color: #4a4a4a;
            padding: 5px; box-sizing: border-box;
        }

        /* 画像枠：少し右（left: 29%）に寄せました */
        .photo-frame {
            position: absolute;
            transform: rotate(-6deg);
            top: 61%; 
            left: 27%; /* ここを25%から29%に増やして右へ移動 */
            width: 45%; 
            height: 13%; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.03); 
            border: 1px dashed rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .photo-frame img {
            width: 100%; height: 100%; object-fit: contain;
        }
        .photo-frame span { font-size: 9px; color: #888; text-align: center; }

        .controls { margin-top: 20px; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; font-family: 'Zen Maru Gothic', sans-serif; transition: 0.2s; }
        .save-db { background: #d4af37; color: white; }
        .download-img { background: #4a90e2; color: white; }
        .btn:active { transform: scale(0.95); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="capture-area">
    <textarea id="report-text" placeholder="今日の成果を記録…"></textarea>
    
    <label class="photo-frame">
        <input type="file" accept="image/*" onchange="previewImage(this)">
        <img id="preview" src="" style="display:none;">
        <span id="plus-text">タップでスクショを追加</span>
    </label>
</div>

<div class="controls">
    <button class="btn save-db" onclick="saveData()">文字を保存</button>
    <button class="btn download-img" onclick="downloadImage()">画像で書き出し</button>
</div>

<script>
    // ページ読み込み時に文字を復元
    window.onload = () => {
        const savedText = localStorage.getItem('magicReport');
        if (savedText) document.getElementById('report-text').value = savedText;
    };

    // 文字のみブラウザに保存
    function saveData() {
        localStorage.setItem('magicReport', document.getElementById('report-text').value);
        alert('魔法の記録を保存しました！');
    }

    // 画像のプレビュー
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const previewImg = document.getElementById('preview');
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                document.getElementById('plus-text').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // 画像として保存（スクショ機能）
    function downloadImage() {
        const area = document.getElementById('capture-area');
        // scale: 2 で画質をきれいにします
        html2canvas(area, { useCORS: true, scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'magic-report.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
