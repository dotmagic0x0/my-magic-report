<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法研究報告書</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #222; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; font-family: 'Zen Maru Gothic', sans-serif; }
        
        #capture-area {
            position: relative;
            width: 375px;
            height: 667px;
            background-color: #444;
            background-image: url('報告書.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* 入力エリアとミラー（表示用）の共通設定 */
        #report-text, #text-mirror {
            position: absolute;
            transform: rotate(-6deg);
            top: 38.5%; 
            left: 25%;
            width: 48%; 
            height: 22%;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 12px;
            line-height: 1.6;
            color: #4a4a4a;
            padding: 5px;
            box-sizing: border-box;
            white-space: pre-wrap; /* 改行を反映 */
            word-wrap: break-word;
            text-align: left;
        }

        /* 普段使う入力欄 */
        #report-text {
            background: transparent;
            border: none; outline: none; resize: none;
            z-index: 10;
        }

        /* 保存の時だけ使うミラー（普段は隠す） */
        #text-mirror {
            display: none;
            z-index: 5;
            /* 紙の色に馴染ませるため、わずかに背景色が必要な場合があります */
        }

        /* スクショ画像枠（はみ出さないよう右寄せ・小さめ） */
        .photo-frame {
            position: absolute;
            transform: rotate(-6deg);
            top: 61%; 
            left: 29%; 
            width: 45%; 
            height: 13%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.03);
            border: 1px dashed rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: contain; }
        .photo-frame span { font-size: 9px; color: #888; text-align: center; }

        .controls { margin-top: 20px; display: flex; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; font-family: 'Zen Maru Gothic', sans-serif; color: white; transition: 0.2s; }
        .save-db { background: #d4af37; }
        .download-img { background: #4a90e2; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="capture-area">
    <textarea id="report-text" placeholder="今日の成果を記録…"></textarea>
    <div id="text-mirror"></div>
    
    <label class="photo-frame">
        <input type="file" accept="image/*" style="display:none;" onchange="previewImage(this)">
        <img id="preview" src="" style="display:none;">
        <span id="plus-text">タップでスクショ追加</span>
    </label>
</div>

<div class="controls">
    <button class="btn save-db" onclick="saveData()">文字を保存</button>
    <button class="btn download-img" onclick="downloadImage()">画像で書き出し</button>
</div>

<script>
// ページを開いた瞬間に合言葉を聞く
const password = prompt("合言葉を入力してください");
if (password !== "むぎ") {
    alert("合言葉が違います");
    document.body.innerHTML = "<h1>アクセス権限がありません</h1>";
}
    // 復元
    window.onload = () => {
        const savedText = localStorage.getItem('magicReport');
        if (savedText) document.getElementById('report-text').value = savedText;
    };

    // 保存
    function saveData() {
        localStorage.setItem('magicReport', document.getElementById('report-text').value);
        alert('魔法の記録を保存しました！');
    }

    // プレビュー
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const previewImg = document.getElementById('preview');
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                document.getElementById('plus-text').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    // ★ここが大事な「ミラー処理」付きの画像保存
    function downloadImage() {
        const area = document.getElementById('capture-area');
        const textarea = document.getElementById('report-text');
        const mirror = document.getElementById('text-mirror');

        // 1. textareaの内容をミラー(DIV)にコピー
        mirror.innerText = textarea.value;
        
        // 2. ミラーを表示して、textareaを透明にする
        mirror.style.display = 'block';
        textarea.style.visibility = 'hidden';

        // 3. 撮影（少し待ってから実行）
        setTimeout(() => {
            html2canvas(area, {
                useCORS: true,
                scale: 3, // 画質。荒ければ3、重ければ2に
                logging: false,
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'magic-report.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                // 4. 終わったら元に戻す
                mirror.style.display = 'none';
                textarea.style.visibility = 'visible';
            }).catch(err => {
                alert('エラーが発生しました。GitHub上で試してみてください。');
                mirror.style.display = 'none';
                textarea.style.visibility = 'visible';
            });
        }, 100);
    }
</script>

</body>
</html>
